<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bpesa — Interactive Component Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9fafb;
  --white: #ffffff;
  --border: #e5e9f2;
  --border2: #cdd4e6;
  --text: #0d1220;
  --muted: #64748b;
  --muted2: #94a3b8;

  /* Component colors */
  --c-user:    #0891b2;
  --c-agent:   #0d9488;
  --c-merchant:#7c3aed;
  --c-relayer: #2563eb;
  --c-master:  #1d4ed8;
  --c-mobile:  #db2777;
  --c-gateway: #4338ca;
  --c-bkes:    #059669;
  --c-fee:     #d97706;
  --c-pretium: #c2410c;
  --c-lp:      #9333ea;
  --c-keeper:  #0f766e;
  --c-vaults:  #b45309;
  --c-smileid: #be185d;
  --c-dns:     #475569;
  --c-watchdog:#7c2d12;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.topbar {
  height: 56px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 20px;
  flex-shrink: 0;
  z-index: 100;
}
.logo {
  font-family: 'Outfit', sans-serif;
  font-size: 20px; font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--text);
}
.logo em { font-style: italic; color: #2563eb; }
.topbar-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: var(--muted);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.topbar-hint {
  margin-left: auto;
  font-size: 12px; color: var(--muted2);
  font-family: 'DM Mono', monospace;
  display: flex; align-items: center; gap: 8px;
}
.hint-dot { width: 8px; height: 8px; border-radius: 50%; background: #2563eb; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.reset-btn {
  padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: var(--white);
  color: var(--muted); transition: all 0.15s; font-family: 'DM Mono', monospace;
}
.reset-btn:hover { border-color: var(--text); color: var(--text); }

/* ── Main layout ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── Canvas ── */
.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
.canvas-wrap:active { cursor: grabbing; }

#canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

/* SVG edges */
.edge {
  stroke: var(--border2);
  stroke-width: 1.5;
  fill: none;
  transition: stroke 0.2s, stroke-width 0.2s, opacity 0.2s;
}
.edge.highlighted {
  stroke-width: 2.5;
  opacity: 1;
}
.edge.dimmed { opacity: 0.08; }

/* Animated flow packet along edge */
.flow-dot {
  r: 4;
  fill: var(--border2);
  opacity: 0;
}
.flow-dot.active {
  opacity: 1;
  animation: flowMove var(--dur, 2s) linear var(--delay, 0s) infinite;
}
@keyframes flowMove {
  0%   { offset-distance: 0%;   opacity: 0; }
  5%   { opacity: 1; }
  90%  { opacity: 1; }
  100% { offset-distance: 100%; opacity: 0; }
}

/* ── Component nodes ── */
.node {
  position: absolute;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: transform 0.15s, filter 0.15s;
  user-select: none;
}
.node:hover { transform: translate(-50%, -50%) scale(1.05); }
.node.selected { transform: translate(-50%, -50%) scale(1.08); filter: drop-shadow(0 4px 16px rgba(0,0,0,0.18)); }
.node.dimmed { opacity: 0.2; pointer-events: none; }

.node-inner {
  background: var(--white);
  border: 2px solid var(--node-color, var(--border2));
  border-radius: 12px;
  padding: 10px 14px;
  min-width: 120px;
  max-width: 148px;
  text-align: center;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s;
}
.node.selected .node-inner {
  box-shadow: 0 0 0 3px var(--node-color, var(--border2)), 0 8px 24px rgba(0,0,0,0.12);
}

.node-icon { font-size: 22px; margin-bottom: 4px; display: block; }
.node-name { font-size: 12px; font-weight: 700; line-height: 1.3; color: var(--text); }
.node-sub { font-size: 9.5px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; line-height: 1.35; }
.node-tag {
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  font-size: 8.5px; font-family: 'DM Mono', monospace; font-weight: 700;
  padding: 2px 7px; border-radius: 10px; white-space: nowrap;
  background: var(--node-color, var(--border2));
  color: white;
  letter-spacing: 0.5px;
}

/* Layer labels */
.layer-label {
  position: absolute;
  font-family: 'DM Mono', monospace;
  font-size: 9px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted2);
  pointer-events: none;
  white-space: nowrap;
}

/* Layer bands */
.layer-band {
  position: absolute;
  left: 0; right: 0;
  border-top: 1px dashed var(--border);
  pointer-events: none;
}

/* ── Detail panel ── */
.detail-panel {
  width: 320px;
  min-width: 320px;
  background: var(--white);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s ease;
}
.detail-panel.hidden {
  width: 0; min-width: 0;
  border-left: none;
}

.panel-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--muted2); gap: 12px; padding: 40px;
  text-align: center;
}
.panel-empty-icon { font-size: 40px; opacity: 0.4; }
.panel-empty-text { font-size: 13px; font-family: 'DM Mono', monospace; line-height: 1.6; }

.panel-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; }
.panel-content.active { display: flex; }

.panel-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.panel-icon { font-size: 28px; margin-bottom: 8px; }
.panel-name { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 3px; }
.panel-type {
  font-size: 9.5px; font-family: 'DM Mono', monospace; font-weight: 700;
  padding: 3px 8px; border-radius: 4px; display: inline-block;
  letter-spacing: 1px; margin-bottom: 8px;
}
.panel-desc { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

.panel-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.panel-section:last-child { border-bottom: none; }
.panel-section-title {
  font-size: 9.5px; font-family: 'DM Mono', monospace; font-weight: 700;
  color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 10px;
}

.resp-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 0; font-size: 12px; line-height: 1.5;
  border-bottom: 1px solid var(--border);
}
.resp-item:last-child { border-bottom: none; }
.resp-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.resp-text { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; }

.conn-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 8px; margin-bottom: 4px;
  font-size: 12px; cursor: pointer; transition: background 0.15s;
  border: 1px solid var(--border);
}
.conn-item:hover { background: var(--bg); }
.conn-item-icon { font-size: 14px; flex-shrink: 0; }
.conn-item-name { font-weight: 600; flex: 1; }
.conn-item-rel { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.conn-arrow-icon { color: var(--muted2); font-size: 12px; }

.flow-tag {
  display: inline-block; font-size: 10px; font-family: 'DM Mono', monospace;
  padding: 3px 8px; border-radius: 12px; margin: 3px 3px 0 0;
  font-weight: 500; border: 1px solid transparent;
  cursor: pointer; transition: opacity 0.15s;
}
.flow-tag:hover { opacity: 0.75; }
</style>
</head>

<!-- TOP BAR -->

</div>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let selectedId = null;
let canvasW = 0, canvasH = 0;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  const wrap = document.getElementById('canvasWrap');
  canvasW = wrap.offsetWidth;
  canvasH = wrap.offsetHeight;

  drawLayerBands();
  drawEdges();
  drawNodes();
  startFlowAnimations();
}

function px(pct, dim) {
  return (pct / 100) * dim;
}

// ─────────────────────────────────────────────
// LAYER BANDS
// ─────────────────────────────────────────────
function drawLayerBands() {
  const wrap = document.getElementById('canvasWrap');
  LAYER_LABELS.forEach(l => {
    const band = document.createElement('div');
    band.className = 'layer-label';
    band.style.left = '14px';
    band.style.top = px(l.y, canvasH) + 'px';
    band.textContent = l.label;
    wrap.appendChild(band);

    if (l.y > 4) {
      const line = document.createElement('div');
      line.className = 'layer-band';
      line.style.top = px(l.y - 1, canvasH) + 'px';
      wrap.appendChild(line);
    }
  });
}

// ─────────────────────────────────────────────
// EDGES
// ─────────────────────────────────────────────
let edgeEls = {};

function getCenter(id) {
  const pos = POSITIONS[id];
  return {
    x: px(pos.x, canvasW),
    y: px(pos.y, canvasH),
  };
}

function drawEdges() {
  const g = document.getElementById('edgesGroup');
  g.innerHTML = '';
  edgeEls = {};

  EDGES.forEach((e, i) => {
    const [from, to, label, bidir] = e;
    const a = getCenter(from);
    const b = getCenter(to);

    // Slight curve
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const offset = Math.min(len * 0.12, 30);
    const cx = mx - (dy / len) * offset;
    const cy = my + (dx / len) * offset;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const d = `M${a.x},${a.y} Q${cx},${cy} ${b.x},${b.y}`;
    path.setAttribute('d', d);
    path.setAttribute('class', 'edge');
    path.setAttribute('marker-end', 'url(#arr-default)');
    path.dataset.from = from;
    path.dataset.to = to;
    path.dataset.idx = i;
    g.appendChild(path);

    edgeEls[`${from}-${to}`] = path;
  });
}

// ─────────────────────────────────────────────
// FLOW ANIMATIONS
// ─────────────────────────────────────────────
function startFlowAnimations() {
  const dotsG = document.getElementById('dotsGroup');
  dotsG.innerHTML = '';

  EDGES.forEach((e, i) => {
    const [from, to] = e;
    const a = getCenter(from);
    const b = getCenter(to);
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    const offset = Math.min(len * 0.12, 30);
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    const cx = mx - (dy / len) * offset;
    const cy = my + (dx / len) * offset;

    const pathId = `flow-path-${i}`;
    const pathEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    pathEl.setAttribute('d', `M${a.x},${a.y} Q${cx},${cy} ${b.x},${b.y}`);
    pathEl.setAttribute('id', pathId);
    pathEl.setAttribute('fill', 'none');
    pathEl.style.display = 'none';
    dotsG.appendChild(pathEl);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', '3.5');
    circle.setAttribute('fill', '#2563eb');
    circle.style.opacity = '0';
    circle.dataset.pathId = pathId;
    circle.dataset.edgeIdx = i;
    dotsG.appendChild(circle);

    // Animate along path
    const dur = 1.8 + Math.random() * 1.4;
    const delay = i * 0.18;
    animateDot(circle, pathEl, dur, delay);
  });
}

function animateDot(circle, pathEl, dur, delay) {
  let startTime = null;
  let delayMs = delay * 1000;
  let durMs = dur * 1000;
  let waiting = true;

  function frame(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;

    if (waiting) {
      if (elapsed < delayMs) {
        requestAnimationFrame(frame);
        return;
      }
      waiting = false;
      startTime = ts;
    }

    const t = ((ts - startTime) % (durMs * 1.4)) / durMs;

    if (t <= 1) {
      const pathLen = pathEl.getTotalLength();
      const pt = pathEl.getPointAtLength(t * pathLen);
      circle.setAttribute('cx', pt.x);
      circle.setAttribute('cy', pt.y);

      // fade in/out
      const alpha = t < 0.05 ? t / 0.05 : t > 0.9 ? (1 - t) / 0.1 : 1;
      circle.style.opacity = (alpha * 0.55).toString();
    } else {
      circle.style.opacity = '0';
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
}

// ─────────────────────────────────────────────
// NODES
// ─────────────────────────────────────────────
let nodeEls = {};

function drawNodes() {
  const layer = document.getElementById('nodesLayer');
  layer.innerHTML = '';
  nodeEls = {};

  Object.values(COMPONENTS).forEach(comp => {
    const pos = POSITIONS[comp.id];
    if (!pos) return;

    const node = document.createElement('div');
    node.className = 'node';
    node.id = `node-${comp.id}`;
    node.style.left = px(pos.x, canvasW) + 'px';
    node.style.top = px(pos.y, canvasH) + 'px';
    node.style.setProperty('--node-color', comp.color);

    node.innerHTML = `
      <div class="node-inner">
        <div class="node-tag">${comp.tag}</div>
        <span class="node-icon">${comp.icon}</span>
        <div class="node-name">${comp.name}</div>
        <div class="node-sub">${comp.sub}</div>
      </div>
    `;

    node.addEventListener('click', () => selectNode(comp.id));
    layer.appendChild(node);
    nodeEls[comp.id] = node;
  });
}

// ─────────────────────────────────────────────
// SELECTION
// ─────────────────────────────────────────────
function selectNode(id) {
  if (selectedId === id) {
    resetSelection();
    return;
  }
  selectedId = id;

  // Find connected nodes
  const connected = new Set();
  connected.add(id);
  EDGES.forEach(([from, to]) => {
    if (from === id) connected.add(to);
    if (to === id) connected.add(from);
  });

  // Update nodes
  Object.keys(nodeEls).forEach(nid => {
    const el = nodeEls[nid];
    el.classList.remove('selected', 'dimmed');
    if (nid === id) el.classList.add('selected');
    else if (!connected.has(nid)) el.classList.add('dimmed');
  });

  // Update edges
  const comp = COMPONENTS[id];
  document.querySelectorAll('.edge').forEach(edge => {
    const from = edge.dataset.from;
    const to = edge.dataset.to;
    edge.classList.remove('highlighted', 'dimmed');
    if (from === id || to === id) {
      edge.classList.add('highlighted');
      edge.style.stroke = comp.color;
    } else {
      edge.classList.add('dimmed');
      edge.style.stroke = '';
    }
  });

  showPanel(id);
}

function resetSelection() {
  selectedId = null;
  Object.values(nodeEls).forEach(el => el.classList.remove('selected', 'dimmed'));
  document.querySelectorAll('.edge').forEach(e => {
    e.classList.remove('highlighted', 'dimmed');
    e.style.stroke = '';
  });
  hidePanel();
}

// ─────────────────────────────────────────────
// DETAIL PANEL
// ─────────────────────────────────────────────
function showPanel(id) {
  const comp = COMPONENTS[id];
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('panelContent');
  const empty = document.getElementById('panelEmpty');

  panel.classList.remove('hidden');
  empty.style.display = 'none';

  // Find connections
  const incoming = [];
  const outgoing = [];
  EDGES.forEach(([from, to, label]) => {
    if (from === id) outgoing.push({ id: to, label });
    if (to === id) incoming.push({ id: from, label });
  });

  content.innerHTML = `
    <div class="panel-header">
      <div class="panel-icon">${comp.icon}</div>
      <div class="panel-name">${comp.name}</div>
      <div class="panel-type" style="background:${comp.color}15;color:${comp.color};border:1px solid ${comp.color}30">${comp.type}</div>
      <div class="panel-desc">${comp.desc}</div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Responsibilities</div>
      ${comp.responsibilities.map(r => `
        <div class="resp-item">
          <div class="resp-dot" style="background:${comp.color}"></div>
          <div class="resp-text">${r}</div>
        </div>
      `).join('')}
    </div>

    ${outgoing.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-title">Sends to</div>
      ${outgoing.map(c => {
        const t = COMPONENTS[c.id];
        return t ? `
          <div class="conn-item" onclick="selectNode('${c.id}')">
            <span class="conn-item-icon">${t.icon}</span>
            <span class="conn-item-name">${t.name}</span>
            <span class="conn-item-rel">${c.label}</span>
            <span class="conn-arrow-icon">→</span>
          </div>` : '';
      }).join('')}
    </div>` : ''}

    ${incoming.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-title">Receives from</div>
      ${incoming.map(c => {
        const t = COMPONENTS[c.id];
        return t ? `
          <div class="conn-item" onclick="selectNode('${c.id}')">
            <span class="conn-item-icon">${t.icon}</span>
            <span class="conn-item-name">${t.name}</span>
            <span class="conn-item-rel">${c.label}</span>
            <span class="conn-arrow-icon">←</span>
          </div>` : '';
      }).join('')}
    </div>` : ''}

    <div class="panel-section">
      <div class="panel-section-title">Appears in flows</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">
        ${comp.flows.map(f => `
          <span class="flow-tag" style="background:${comp.color}12;color:${comp.color};border-color:${comp.color}30">
            ${f}
          </span>
        `).join('')}
      </div>
    </div>
  `;

  content.classList.add('active');
}

function hidePanel() {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('panelContent');
  const empty = document.getElementById('panelEmpty');
  panel.classList.add('hidden');
  content.classList.remove('active');
  content.innerHTML = '';
  empty.style.display = '';
}

  const wrap = document.getElementById('canvasWrap');
  canvasW = wrap.offsetWidth;
  canvasH = wrap.offsetHeight;
